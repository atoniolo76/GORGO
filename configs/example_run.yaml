# Example single-run config. NOTE: no silent defaults — every
# experiment-defining field is explicit below. `engine.*` has
# documented harness-internal defaults.
name: "prefix-cache-baseline"

policy:
  policy_id: "prefix-cache"
  params:
    block_size: 16

topology:
  pods:
    - pod_id: "p0"
      role: "both"
      gpu_count: 1
      kv_cache_bytes: 4294967296        # 4 GiB
      max_concurrent_prefill: 4
      max_concurrent_decode: 16
    - pod_id: "p1"
      role: "both"
      gpu_count: 1
      kv_cache_bytes: 4294967296
      max_concurrent_prefill: 4
      max_concurrent_decode: 16
    - pod_id: "p2"
      role: "both"
      gpu_count: 1
      kv_cache_bytes: 4294967296
      max_concurrent_prefill: 4
      max_concurrent_decode: 16
    - pod_id: "p3"
      role: "both"
      gpu_count: 1
      kv_cache_bytes: 4294967296
      max_concurrent_prefill: 4
      max_concurrent_decode: 16

compute:
  prefill_ms_per_token: 0.08
  decode_ms_per_token: 6.0
  prefill_overhead_ms: 5.0
  decode_overhead_ms: 2.0

network:
  client_rtt_ms: 5.0
  inter_pod_rtt_ms: 0.2
  inter_pod_bandwidth_gbps: 100.0
  kv_bytes_per_token: 131072              # 128 KiB/token (KV per token, illustrative)
  serialization_overhead_ms: 0.5

scheduler:
  base_routing_ms: 0.2
  per_pod_consideration_us: 5.0

engine:
  kv_ewma_alpha: 0.2
  block_size: 16
  initial_warm_latency_ms: 5.0

workload:
  kind: "synthetic"
  params:
    n_requests: 2000
    arrival_rate_qps: 8.0
    n_prefix_families: 256
    zipf_s: 1.1
    prompt_len_min: 256
    prompt_len_max: 2048
    max_output_tokens: 128
    n_sessions: 200
    # Shared-head mode: each family gets a 1024-token deterministic
    # prefix (64 blocks @ block_size=16) in prompt_tokens itself, and
    # prefix_key is cleared so the engine enumerates real block hashes.
    # Without this, prefix_key collapses every family to a single
    # opaque block and hit_rate/capture_rate pin to ~1.0 across all
    # policies (see tests/unit/test_workload.py::shared_head).
    # 256 families × 64 blocks = 16384 unique blocks total; each pod
    # holds 4 GiB / (128 KiB/tok × 16 tok/block) = 2048 blocks, so the
    # working set is 8× per-pod capacity — forces meaningful eviction
    # contention and tests policy differentiation under cache pressure.
    shared_prefix_tokens: 1024

seeds: [0, 1, 2]
output_dir: "results/prefix-cache-baseline"
