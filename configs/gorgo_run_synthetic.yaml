# Base run for the gorgo comparison sweep on the synthetic-potent
# workload (mirrors example_run.yaml topology / compute / network so
# results are directly comparable to §6 of routing-comparison.md).
# Single seed per the bead's compute-throttle directive (go-4jm).
name: "gorgo-comparison-synthetic-base"

policy:
  policy_id: "gorgo"
  params:
    block_size: 16
    t_prefill: 0.05
    queued_tokens_weight: 0.001

topology:
  pods:
    - pod_id: "p0"
      role: "both"
      gpu_count: 1
      kv_cache_bytes: 4294967296        # 4 GiB
      max_concurrent_prefill: 4
      max_concurrent_decode: 16
    - pod_id: "p1"
      role: "both"
      gpu_count: 1
      kv_cache_bytes: 4294967296
      max_concurrent_prefill: 4
      max_concurrent_decode: 16
    - pod_id: "p2"
      role: "both"
      gpu_count: 1
      kv_cache_bytes: 4294967296
      max_concurrent_prefill: 4
      max_concurrent_decode: 16
    - pod_id: "p3"
      role: "both"
      gpu_count: 1
      kv_cache_bytes: 4294967296
      max_concurrent_prefill: 4
      max_concurrent_decode: 16

compute:
  prefill_ms_per_token: 0.08
  decode_ms_per_token: 6.0
  prefill_overhead_ms: 5.0
  decode_overhead_ms: 2.0

network:
  client_rtt_ms: 5.0
  inter_pod_rtt_ms: 0.2
  inter_pod_bandwidth_gbps: 100.0
  kv_bytes_per_token: 131072
  serialization_overhead_ms: 0.5

scheduler:
  base_routing_ms: 0.2
  per_pod_consideration_us: 5.0

engine:
  kv_ewma_alpha: 0.2
  block_size: 16
  initial_warm_latency_ms: 5.0

workload:
  kind: "synthetic"
  params:
    n_requests: 2000
    arrival_rate_qps: 8.0
    n_prefix_families: 256
    zipf_s: 1.1
    prompt_len_min: 256
    prompt_len_max: 2048
    max_output_tokens: 128
    n_sessions: 200
    shared_prefix_tokens: 1024

seeds: [0]
output_dir: "research/data/gorgo_comparison/synthetic"
