openapi: 3.1.0
info:
  title: GORGO proxy
  version: 0.1.0
  description: |
    Routing proxy in front of a pool of SGLang replicas.

    The proxy forwards OpenAI-compatible chat-completions requests and selects
    a replica per request via a pluggable policy. A background task keeps a
    live snapshot of each replica's Prometheus `/metrics` feed; policies read
    this snapshot instead of fetching synchronously on every request.

    Control-plane routes let callers change the active policy, tune
    hyperparameters, add/remove replicas, and flush the proxy trie plus
    upstream KV caches at runtime without restarting the proxy container.

servers:
  - url: https://{tunnel_host}
    description: Modal tunnel host printed on proxy startup
    variables:
      tunnel_host:
        default: example.modal.run

tags:
  - name: control-plane
    description: Runtime configuration endpoints
  - name: observability
    description: Read-only introspection of proxy state
  - name: proxy
    description: Passthrough to upstream replicas
  - name: debug
    description: Diagnostic endpoints intended for development / inspection
  - name: tracing
    description: Runtime trace capture and artifact export
  - name: workload
    description: Proxy-local workload replay controls

paths:
  /policy:
    get:
      tags: [control-plane, observability]
      summary: Get the active routing policy
      responses:
        '200':
          description: Current policy state.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PolicyState' }
    post:
      tags: [control-plane]
      summary: Set the active routing policy
      description: |
        Switches the policy used by `POST /v1/chat/completions` for all
        subsequent requests. `policy` and `name` are accepted as synonyms in
        the request body. Names are normalized: leading/trailing whitespace
        is stripped, underscores are converted to hyphens, and the result is
        lowercased before lookup (e.g. `power_of_two` -> `power-of-two`,
        `Least_Request` -> `least-request`).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PolicyRequest' }
            examples:
              gorgo:
                value: { policy: gorgo }
              power_of_two:
                value: { name: power_of_two }
              least_request:
                value: { policy: least-request }
      responses:
        '200':
          description: Policy updated. Returns the new policy and whether it consumes GORGO hyperparameters.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PolicyUpdateResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '405': { $ref: '#/components/responses/MethodNotAllowed' }

  /hyperparameters:
    get:
      tags: [control-plane, observability]
      summary: Get gorgo hyperparameters
      responses:
        '200':
          description: Current hyperparameter values, allowed keys, and factory defaults.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HyperparameterState' }
    post:
      tags: [control-plane]
      summary: Merge hyperparameter updates
      description: |
        Partial update of the structured hyperparameter store. Two body
        shapes are accepted:

        * **Flat** -- `{"t_prefill": X, "queued_tokens_weight": Y}`. Keys
          are written to the global `defaults` slot. This is the shape
          `proxy/calibrate.py` and `proxy/tuning.py` use.
        * **Structured** -- `{"defaults": {...}, "per_target": {url:
          {...}}}`. Either branch is optional. `per_target` URLs must be
          currently-registered replicas. Each block's keys must be a
          subset of `allowed_keys` and values must be numeric.

        Mixing flat keys with `defaults`/`per_target` in the same body
        is rejected with a 400.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/HyperparameterUpdate' }
            examples:
              tune_prefill:
                summary: Update one default
                value: { t_prefill: 0.8 }
              both_defaults:
                summary: Update both defaults
                value: { t_prefill: 0.8, queued_tokens_weight: 1.5 }
              defaults_only_explicit:
                summary: Same as flat, but using the structured slot
                value: { defaults: { t_prefill: 0.8 } }
              per_target_only:
                summary: Override one replica without touching defaults
                value:
                  per_target:
                    https://r1.modal.run:
                      t_prefill: 0.0005
              defaults_and_per_target:
                summary: Update defaults and add one per-target override
                value:
                  defaults: { t_prefill: 0.8, queued_tokens_weight: 1.5 }
                  per_target:
                    https://r1.modal.run:
                      queued_tokens_weight: 0.001
      responses:
        '200': { $ref: '#/components/responses/HyperparametersUpdated' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '405': { $ref: '#/components/responses/MethodNotAllowed' }
    patch:
      tags: [control-plane]
      summary: Merge hyperparameter updates (alias of POST)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/HyperparameterUpdate' }
      responses:
        '200': { $ref: '#/components/responses/HyperparametersUpdated' }
        '400': { $ref: '#/components/responses/BadRequest' }
    put:
      tags: [control-plane]
      summary: Replace hyperparameters
      description: |
        Resets the entire hyperparameter store to factory defaults
        (`defaults` re-seeded from `DEFAULT_GORGO_HYPERPARAMETERS`,
        `per_target` cleared) and then applies the provided update on
        top. Useful for returning to a known baseline -- including
        clearing all per-target overrides -- in one call.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/HyperparameterUpdate' }
      responses:
        '200': { $ref: '#/components/responses/HyperparametersUpdated' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /replicas:
    get:
      tags: [control-plane, observability]
      summary: List the currently registered replica endpoints
      description: |
        Read-only. Returns this proxy's in-memory `replica_urls` plus a
        snapshot of the global `GORGO-replicas` Modal Dict (informational --
        in matrix mode the local pin is authoritative and may differ from
        the Dict).
      responses:
        '200':
          description: Registered replica URLs.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReplicasList' }
    post:
      tags: [control-plane]
      summary: Replace the replica set
      description: |
        Fully replaces the replica set on this proxy. Accepts either a bare
        JSON array of URLs or an object wrapping one under `replicas` (or
        `endpoints`). Each URL must start with `http://` or `https://`;
        trailing slashes and duplicates are normalized away.

        Removed replicas have their queue-token counters and live-metric
        snapshots cleared. Newly added replicas start with a zero queue-token
        counter; they become eligible for non-random policies once the next
        background refresh populates their metrics (<=
        `refresh_interval_seconds`, default 1s).

        Affects only this proxy's local state -- the global `GORGO-replicas`
        Modal Dict is left untouched. (Earlier versions cleared and
        rewrote the global Dict here; in matrix experiments where N proxies
        each pinned their own per-policy URLs concurrently, that mutation
        clobbered sibling proxies' pins via GET /replicas re-sync.)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - { $ref: '#/components/schemas/ReplicasRequestObject' }
                - { $ref: '#/components/schemas/ReplicasRequestArray' }
            examples:
              bare_array:
                value:
                  - https://replica-a.modal.run
                  - https://replica-b.modal.run
              wrapped:
                value:
                  replicas:
                    - https://replica-a.modal.run
                    - https://replica-b.modal.run
      responses:
        '200':
          description: Replica set updated; `added` and `removed` report the diff.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReplicasUpdateResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '405': { $ref: '#/components/responses/MethodNotAllowed' }

  /trie:
    get:
      tags: [observability, debug]
      summary: Summary stats for the proxy's prompt-prefix radix trie
      description: |
        Returns aggregate counters for the in-memory radix trie that tracks
        which replica was last seen serving each token-prefix. The full trie
        is not serialized; only summary numbers and a per-replica
        `replica_coverage` count of tagged nodes.
      responses:
        '200':
          description: Trie summary.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TrieSummary' }

  /replica_metrics:
    get:
      tags: [observability]
      summary: Inspect the live metrics snapshot
      description: |
        Returns the most recent metrics the background loop scraped from each
        replica, along with per-replica in-flight queue-token counters and
        the age of the last refresh pass. Endpoints absent from `metrics`
        have not yet been successfully scraped; endpoints present in
        `errors` failed on the most recent pass.
      responses:
        '200':
          description: Snapshot of live metrics and proxy counters.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReplicaMetricsSnapshot' }

  /flush:
    post:
      tags: [control-plane]
      summary: Clear proxy routing trie and flush KV cache on all replicas
      description: |
        Resets the proxy's in-memory radix trie (the global view of which
        replica may hold which prompt prefix). In parallel, sends
        `POST /flush_cache` to each registered SGLang replica so each upstream
        clears its RadixAttention KV cache. Individual replicas may return a
        non-success status if the server is busy (SGLang often requires idle).
      responses:
        '200':
          description: Trie cleared; per-replica upstream results in `replicas`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FlushResponse' }
        '405': { $ref: '#/components/responses/MethodNotAllowed' }

  /samples:
    get:
      tags: [observability, debug]
      summary: Inspect the on-the-fly tuning sample buffer
      description: |
        Returns recent per-request samples produced by the SSE tee in the
        chat-completions handler, plus the bookkeeping `POST /tune` uses
        for hop-size debouncing. Each sample carries TTFT / total /
        prompt+completion tokens along with the per-token `prefill_rate` /
        `decode_rate` decomposition that drives recommendation. The
        response trims to the last 50 samples to stay small; full history
        up to `max_buffer_size` is consumed by `/tune`.
      responses:
        '200':
          description: Tuning buffer state.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SamplesState' }
        '405': { $ref: '#/components/responses/MethodNotAllowed' }

  /tune:
    get:
      tags: [observability, debug]
      summary: Live auto-tuner status (no side effects)
      description: |
        Returns the current auto-tuner config (`enabled`, `window_size`,
        `hop_size`, `apply`), per-window progress
        (`samples_since_last_apply`, `samples_until_next_apply`) and
        diagnostics (`applied_count`, `last_recommendation`,
        `enabled_at_monotonic`, `current_policy`,
        `current_hyperparameters`).
      responses:
        '200':
          description: Auto-tuner snapshot.
          content:
            application/json:
              schema:
                type: object
                required: [auto_tune]
                properties:
                  auto_tune: { $ref: '#/components/schemas/AutoTuneStatus' }
        '405': { $ref: '#/components/responses/MethodNotAllowed' }
    post:
      tags: [control-plane]
      summary: Toggle / reconfigure the on-the-fly auto-tuner
      description: |
        The auto-tuner is a *stateful toggle*, not a one-shot endpoint.
        Once enabled it keeps recomputing `gorgo` hyperparameters every
        `hop_size` new samples (after the first `window_size` samples
        have accumulated to fill the window) until explicitly disabled.

        Each `POST /tune` atomically merges the body into the live
        config; only the keys present in the body are touched, so
        `{"hop_size": 25}` adjusts the hop without affecting `enabled`,
        `window_size`, or `apply`. A bare `POST /tune {}` defaults to
        `enabled: true` so the common case ("turn it on with current
        defaults") stays terse. To turn it off, post
        `{"enabled": false}`.

        Recompute happens inline on the sample-recording hot path
        (single asyncio thread, no background task) so reconfigures
        take effect on the next inbound request. Switching to
        `apply: false` runs the recommender in shadow mode -- updates
        `last_recommendation` for diff inspection without mutating
        `state["hyperparameters"]`.

        Enabling requires `policy: gorgo` (the only policy that
        consumes `t_prefill` / `queued_tokens_weight`). Disabling works
        regardless of policy so a misconfigured tuner can always be
        turned off.
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TuneRequest' }
            examples:
              enable_with_defaults:
                summary: Turn on with current config (window=100, hop=50)
                value: {}
              enable_explicit:
                summary: Turn on, set window/hop/apply explicitly
                value: { enabled: true, window_size: 200, hop_size: 50, apply: true }
              reconfigure_hop:
                summary: While running, drop the hop to react faster
                value: { hop_size: 20 }
              shadow_mode:
                summary: Keep running but stop mutating hyperparameters
                value: { apply: false }
              disable:
                summary: Turn the tuner off
                value: { enabled: false }
      responses:
        '200':
          description: |
            Auto-tuner reconfigured. Response includes the post-update
            status snapshot and a best-effort `preview` (recommendation
            + summary stats over the trailing `window_size` samples)
            when the buffer is non-empty.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TuneResponse' }
        '400':
          description: |
            Body is not an object, a numeric field is invalid, or
            `enabled: true` was requested while `policy != 'gorgo'`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '405': { $ref: '#/components/responses/MethodNotAllowed' }

  /trace/start:
    post:
      tags: [tracing]
      summary: Start bounded metrics/request tracing
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TraceStartRequest' }
            examples:
              start:
                value: { trace_id: moon_seed0_gorgo, max_events: 200000 }
      responses:
        '200':
          description: Trace capture started.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TraceStatusResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /trace/status:
    get:
      tags: [tracing, observability]
      summary: Get current trace buffer status
      responses:
        '200':
          description: Trace buffer status.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TraceStatusResponse' }

  /trace/stop:
    post:
      tags: [tracing]
      summary: Stop trace capture
      responses:
        '200':
          description: Trace capture stopped.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TraceStatusResponse' }

  /trace/save:
    post:
      tags: [tracing]
      summary: Save trace buffers to the benchmark results volume
      description: |
        Writes JSONL trace artifacts under
        `/results/proxy_traces/<trace_id>/` on the `GORGO-bench-results`
        volume.
      responses:
        '200':
          description: Trace artifacts written and the volume committed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TraceSaveResponse' }

  /tuning/start:
    post:
      tags: [control-plane, workload]
      summary: Start proxy-embedded batch GORGO tuning
      description: |
        Starts an asyncio background task inside the proxy. Each candidate
        hyperparameter setting is evaluated by running `proxy/workload.py`
        logic locally against `http://127.0.0.1:8000`, removing
        client-to-proxy tunnel latency from the tuning metric. Supports
        `source: mooncake` with a body-included Mooncake FAST '25 JSONL trace.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BatchTuningStartRequest' }
      responses:
        '202':
          description: Tuning run accepted.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BatchTuningStatusResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '409':
          description: Another batch tuning run is active or live auto-tune is enabled.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /tuning/status:
    get:
      tags: [observability, workload]
      summary: Get proxy-embedded batch tuning status
      responses:
        '200':
          description: Batch tuning status.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BatchTuningStatusResponse' }

  /tuning/stop:
    post:
      tags: [control-plane, workload]
      summary: Cancel active proxy-embedded batch tuning
      responses:
        '202':
          description: Cancellation requested.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BatchTuningStatusResponse' }
        '200':
          description: No active tuning run.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BatchTuningStatusResponse' }

  /workload/start:
    post:
      tags: [workload]
      summary: Start a proxy-local workload replay
      description: |
        Starts an asyncio background workload task inside the proxy and replays
        requests through `http://127.0.0.1:8000`. This is intended for policy
        matrix experiments where each proxy/fleet receives the same Mooncake
        trace and optional `start_at_wall_time`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WorkloadStartRequest' }
      responses:
        '202':
          description: Workload accepted.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkloadStatusResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '409':
          description: A workload is already active.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /workload/status:
    get:
      tags: [workload, observability]
      summary: Get proxy-local workload status
      responses:
        '200':
          description: Workload status.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkloadStatusResponse' }

  /workload/stop:
    post:
      tags: [workload]
      summary: Cancel an active proxy-local workload
      responses:
        '202':
          description: Cancellation requested.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkloadStatusResponse' }
        '200':
          description: No active workload.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkloadStatusResponse' }

  /v1/chat/completions:
    post:
      tags: [proxy]
      summary: OpenAI-compatible chat completions passthrough
      description: |
        The body is parsed just enough to extract `messages` for tokenization
        (used by the `gorgo` policy and the queue-token counter); everything
        else is forwarded verbatim to the chosen replica. The upstream
        response is streamed back to the client chunk-by-chunk: the proxy
        emits the ASGI `http.response.start` as soon as the upstream returns
        headers (no body buffering), which preserves meaningful time-to-first-
        token measurements.

        When the client sends `stream: true`, the upstream responds with
        `Content-Type: text/event-stream` and the proxy forwards each SSE
        event (`data: {...}\n\n`) as it arrives. Otherwise the upstream
        returns a single JSON body, which is still forwarded via the same
        streaming path (the body just happens to arrive in one or two
        chunks).

        If the active policy fails to select a replica (e.g. metrics not yet
        populated) the proxy falls back to random selection.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChatCompletionsRequest' }
      responses:
        '200':
          description: |
            Passthrough of the upstream replica's response. `application/json`
            for non-streaming requests, `text/event-stream` for
            `stream: true` requests.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ChatCompletionsResponse' }
            text/event-stream:
              schema:
                type: string
                description: |
                  OpenAI-compatible server-sent events. Each event is a line
                  of the form `data: <json-chunk>\n\n`; the final event is
                  `data: [DONE]\n\n`. The JSON payload of each chunk matches
                  OpenAI's `chat.completion.chunk` object.
        '400': { $ref: '#/components/responses/BadRequest' }
        '502':
          description: |
            Upstream replica unreachable or failed before the proxy could
            commit to a status code. A mid-stream upstream failure cannot
            produce this response (headers are already flushed) and instead
            results in a truncated body.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '503':
          description: |
            The shared upstream HTTP client has not been initialized yet
            (request raced lifespan startup). Retry once the proxy is fully
            up.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

components:
  schemas:
    Policy:
      type: string
      description: |
        Routing policy id. The set of accepted values comes from
        `policy.ROUTING_POLICIES`; names are kebab-case after the
        proxy normalizes the request body (underscores -> hyphens, lowercased,
        trimmed).

        Highlights:
        - `random`: uniform random selection.
        - `power-of-two`: sample two replicas, route to the one with fewer
          used + queued tokens.
        - `gorgo`: multi-objective score
          `latency + t_prefill * request_tokens + queued_tokens_weight * (queue + used)`,
          minimized across all replicas.
        - `least-request`, `least-load`, `least-kv-cache`,
          `least-gpu-cache`, `least-latency`, `least-utilization`,
          `least-busy-time`, `throughput`, `pack-load`, `prefix-cache`,
          `queue-router`, `vtc`, `vtc-basic`, `slo`, `slo-pack-load`,
          `slo-least-load`, `slo-least-load-pulling`, `fallback`: Aibrix
          gateway/algorithms aliases (see `policy/lb_aibrix.py`).
        - `simple-session-affinity`: hash-based; reads the radix trie and
          queue counters but not `/metrics`.
        - `pd`, `pd-disaggregation`: accepted for API compatibility but not
          implemented in this standalone proxy; treated as random.

        Use `GET /policy` to discover the exact set supported by the running
        proxy.
      enum:
        - random
        - gorgo
        - power-of-two
        - least-request
        - least-load
        - least-kv-cache
        - least-gpu-cache
        - least-latency
        - least-utilization
        - least-busy-time
        - throughput
        - pack-load
        - prefix-cache
        - queue-router
        - simple-session-affinity
        - vtc
        - vtc-basic
        - slo
        - slo-pack-load
        - slo-least-load
        - slo-least-load-pulling
        - fallback
        - pd-disaggregation
        - pd

    PolicyRequest:
      type: object
      description: At least one of `policy` / `name` is required.
      properties:
        policy: { $ref: '#/components/schemas/Policy' }
        name: { $ref: '#/components/schemas/Policy' }
      additionalProperties: false

    PolicyState:
      type: object
      required: [policy, supported, uses_hyperparameters, hyperparameters]
      properties:
        policy: { $ref: '#/components/schemas/Policy' }
        supported:
          type: array
          description: Sorted list of all policy ids accepted by this proxy.
          items: { $ref: '#/components/schemas/Policy' }
        uses_hyperparameters:
          type: boolean
          description: True only for policies that consume the GORGO hyperparameter store.
        hyperparameters:
          oneOf:
            - $ref: '#/components/schemas/HyperparameterStore'
            - type: 'null'
          description: Current GORGO hyperparameters when the active policy uses them; otherwise null.

    PolicyUpdateResponse:
      type: object
      required: [policy, uses_hyperparameters, hyperparameters]
      description: Response body from `POST /policy`. Does not include `supported`.
      properties:
        policy: { $ref: '#/components/schemas/Policy' }
        uses_hyperparameters:
          type: boolean
          description: True only for policies that consume the GORGO hyperparameter store.
        hyperparameters:
          oneOf:
            - $ref: '#/components/schemas/HyperparameterStore'
            - type: 'null'
          description: Current GORGO hyperparameters when the active policy uses them; otherwise null.

    Hyperparameters:
      type: object
      description: |
        Per-replica tunables consumed by the `gorgo` policy scoring
        function. This is the *block* schema used inside both
        `defaults` and each `per_target` entry of
        `HyperparameterStore`. All keys are optional inside a block;
        missing keys fall through to defaults. Unknown keys are
        rejected with a 400.
      properties:
        t_prefill:
          type: number
          description: Coefficient applied to the request's effective prefill token count.
        queued_tokens_weight:
          type: number
          description: Coefficient applied to `(in_flight_queue + num_used_tokens)`.
      additionalProperties: false

    HyperparameterStore:
      type: object
      description: |
        Structured GORGO hyperparameter store. `defaults` applies to
        every replica; `per_target` keys specific replica URLs that
        override individual scalars. The auto-tuner produces
        per-target overrides automatically once enough live samples
        accumulate per replica; `proxy/calibrate.py` and
        `proxy/tuning.py` write only `defaults`.

        Resolution order for a single replica `u` is:
        `per_target[u]` (if present) layered on top of `defaults`,
        layered on top of `DEFAULT_GORGO_HYPERPARAMETERS`.
      required: [defaults, per_target]
      properties:
        defaults:
          $ref: '#/components/schemas/Hyperparameters'
        per_target:
          type: object
          description: Map of replica URL -> override block.
          additionalProperties:
            $ref: '#/components/schemas/Hyperparameters'

    HyperparameterUpdate:
      description: |
        Body shape for `POST` / `PATCH` / `PUT /hyperparameters`.
        Two equivalent forms are accepted:

        1. **Flat** -- a `Hyperparameters` block; the keys are written
           to the `defaults` slot.
        2. **Structured** -- an object with optional `defaults` and
           optional `per_target` (URL -> block). Lets callers write
           per-replica overrides.

        Mixing the two shapes (flat keys alongside `defaults` /
        `per_target`) is rejected with a 400.
      oneOf:
        - $ref: '#/components/schemas/Hyperparameters'
        - type: object
          properties:
            defaults: { $ref: '#/components/schemas/Hyperparameters' }
            per_target:
              type: object
              additionalProperties:
                $ref: '#/components/schemas/Hyperparameters'
          additionalProperties: false

    HyperparameterState:
      type: object
      required: [hyperparameters, allowed_keys, defaults]
      properties:
        hyperparameters: { $ref: '#/components/schemas/HyperparameterStore' }
        allowed_keys:
          type: array
          description: Allowed keys inside any `defaults` / `per_target.<url>` block.
          items: { type: string }
        defaults:
          $ref: '#/components/schemas/Hyperparameters'
          description: Factory defaults used as a baseline; not the active `defaults`.

    ReplicaUrl:
      type: string
      pattern: '^https?://'
      description: Base URL of an upstream SGLang replica (no trailing slash).
      examples:
        - https://replica-a.modal.run

    ReplicasList:
      type: object
      required: [replicas, count, registry]
      properties:
        replicas:
          type: array
          items: { $ref: '#/components/schemas/ReplicaUrl' }
        count: { type: integer, minimum: 0 }
        registry:
          type: object
          description: Raw Modal Dict key/value view. Empty values are inactive and excluded from `replicas`.
          additionalProperties:
            type: string

    ReplicasRequestArray:
      type: array
      items: { $ref: '#/components/schemas/ReplicaUrl' }

    ReplicasRequestObject:
      type: object
      properties:
        replicas:
          type: array
          items: { $ref: '#/components/schemas/ReplicaUrl' }
        endpoints:
          type: array
          items: { $ref: '#/components/schemas/ReplicaUrl' }
      description: Exactly one of `replicas` or `endpoints` should be provided.

    ReplicasUpdateResponse:
      allOf:
        - $ref: '#/components/schemas/ReplicasList'
        - type: object
          required: [added, removed]
          properties:
            added:
              type: array
              items: { $ref: '#/components/schemas/ReplicaUrl' }
            removed:
              type: array
              items: { $ref: '#/components/schemas/ReplicaUrl' }

    ReplicaLiveMetrics:
      type: object
      required:
        - num_running_reqs
        - num_queue_reqs
        - num_used_tokens
        - latency_seconds
        - gen_throughput
        - utilization
      properties:
        num_running_reqs:
          type: integer
          description: SGLang `sglang:num_running_reqs`.
        num_queue_reqs:
          type: integer
          description: SGLang `sglang:num_queue_reqs`.
        num_used_tokens:
          type: integer
          description: SGLang `sglang:num_used_tokens` (KV-cache occupancy).
        latency_seconds:
          type: number
          description: |
            Wall-clock time of the last `/metrics` scrape for this replica.
            Includes SGLang's Prometheus handler time, so it inflates under
            load and is a noisy upper bound on pure network RTT. Prefer
            `network_rtt_seconds` for network-leg estimates.
        network_rtt_seconds:
          oneOf:
            - type: number
            - type: 'null'
          description: |
            EWMA-smoothed RTT of a dedicated lightweight probe (`GET /` to
            the replica's base URL) issued in parallel with each metrics
            scrape. Isolates pure network RTT from SGLang load. `null` until
            the first probe completes a successful round-trip (cold start).
        gen_throughput:
          type: number
          description: SGLang `sglang:gen_throughput` (generation tokens/sec).
        utilization:
          type: number
          description: SGLang `sglang:utilization` (0-1 server utilization estimate).

    ReplicaMetricsSnapshot:
      type: object
      required:
        [refresh_interval_seconds, last_refresh_age_seconds, errors, metrics, endpoints_queued_tokens]
      properties:
        refresh_interval_seconds: { type: number }
        last_refresh_age_seconds:
          oneOf:
            - type: number
            - type: 'null'
          description: Seconds since the last full refresh pass; `null` before the first pass.
        errors:
          type: object
          additionalProperties: { type: string }
          description: Map of replica URL to the error from the most recent failed scrape. Absent keys scraped successfully.
        metrics:
          type: object
          additionalProperties: { $ref: '#/components/schemas/ReplicaLiveMetrics' }
        endpoints_queued_tokens:
          type: object
          additionalProperties: { type: integer }
          description: Estimated in-flight prompt tokens per replica (increments on dispatch, decrements on response).

    TrieSummary:
      type: object
      required:
        - num_sequences
        - total_tokens_inserted
        - unique_token_count
        - node_count
        - tagged_node_count
        - replica_coverage
      properties:
        num_sequences:
          type: integer
          description: Total number of prompts inserted into the trie since the last flush.
        total_tokens_inserted:
          type: integer
          description: Sum of token-ids inserted across all prompts (counts repeats).
        unique_token_count:
          type: integer
          description: Number of unique token-ids stored across all trie edges.
        node_count:
          type: integer
          description: Total trie node count, including the root.
        tagged_node_count:
          type: integer
          description: Number of nodes tagged with at least one replica endpoint.
        replica_coverage:
          type: object
          description: |
            For each currently registered replica URL, the count of trie nodes
            tagged with that endpoint. Useful as a sanity check on how routing
            distributed prefix sharing across the replica set.
          additionalProperties: { type: integer }

    FlushResponse:
      type: object
      required: [radix_trie_cleared, replicas]
      properties:
        radix_trie_cleared:
          type: boolean
          description: Always true when the handler completes; the proxy trie was reset.
        replicas:
          type: object
          description: |
            Per-registered-replica result of `POST /flush_cache`. Values are
            either success objects with `ok` and `status_code`, or failure
            objects with `ok` and `error` / `body_preview`.
          additionalProperties: true

    TuneRequest:
      type: object
      description: |
        All fields are optional; only present keys are merged into the
        live auto-tuner config. `enabled` defaults to `true` so a bare
        `{}` body turns the tuner on with current settings; pass
        `{"enabled": false}` to disable.
      properties:
        enabled:
          type: boolean
          description: |
            Toggle the auto-tuner. Defaults to `true` when the field is
            absent so the common "turn it on" call is just `POST /tune
            {}`. When transitioning from off to on the per-window
            counter is reset, so the next recompute is timed from this
            moment.
        window_size:
          type: integer
          minimum: 1
          description: |
            Trailing-sample window fed to `recommend_hyperparameters`
            on each recompute. Capped implicitly at `max_buffer_size`
            from `/samples`. The very first recompute waits until the
            buffer holds at least this many samples.
        hop_size:
          type: integer
          minimum: 1
          description: |
            Recompute every N new samples. Smaller hops react faster to
            load shifts; larger hops are more stable. Must be > 0.
        apply:
          type: boolean
          description: |
            When `true` (default), merges each recommendation into the
            live hyperparameter map. When `false`, the recommender
            still runs (and `last_recommendation` is updated) but
            `state["hyperparameters"]` is not mutated -- useful for
            shadow-mode comparison against the current settings.
      additionalProperties: false

    TraceStartRequest:
      type: object
      properties:
        trace_id:
          type: string
          description: Optional stable trace id used in output paths.
        sample_metrics:
          type: boolean
          default: true
        sample_requests:
          type: boolean
          default: true
        max_events:
          type: integer
          minimum: 1
          default: 200000
        append:
          type: boolean
          default: false
      additionalProperties: false

    TraceStatus:
      type: object
      properties:
        enabled: { type: boolean }
        trace_id:
          oneOf:
            - type: string
            - type: 'null'
        sample_metrics: { type: boolean }
        sample_requests: { type: boolean }
        max_events: { type: integer }
        started_at:
          oneOf:
            - type: string
            - type: 'null'
        stopped_at:
          oneOf:
            - type: string
            - type: 'null'
        dropped_metrics: { type: integer }
        dropped_requests: { type: integer }
        saved_paths:
          oneOf:
            - $ref: '#/components/schemas/TracePaths'
            - type: 'null'
        metrics_events: { type: integer }
        request_events: { type: integer }
        first_event_ts:
          oneOf:
            - type: string
            - type: 'null'
        last_event_ts:
          oneOf:
            - type: string
            - type: 'null'

    TracePaths:
      type: object
      required: [metrics_path, requests_path, manifest_path]
      properties:
        metrics_path: { type: string }
        requests_path: { type: string }
        manifest_path: { type: string }

    TraceStatusResponse:
      type: object
      required: [trace]
      properties:
        trace: { $ref: '#/components/schemas/TraceStatus' }

    TraceSaveResponse:
      type: object
      required: [trace, paths]
      properties:
        trace: { $ref: '#/components/schemas/TraceStatus' }
        paths: { $ref: '#/components/schemas/TracePaths' }

    WorkloadSource:
      type: string
      enum: [glm5, hf, mooncake]

    ArrivalMode:
      type: string
      enum: [bounded, open-loop]

    WorkloadStartRequest:
      type: object
      required: [data_path]
      properties:
        data_path:
          type: string
          description: "For `source: mooncake`, path to a body-included Mooncake JSONL trace under `/data`."
        run_id: { type: string }
        concurrency:
          type: integer
          minimum: 1
          default: 16
        model:
          type: string
        stream:
          oneOf:
            - type: boolean
            - type: 'null'
        max_tokens:
          type: integer
          minimum: 0
        max_input_tokens:
          type: integer
          description: 0 = auto, negative = disable, positive = explicit cap.
        arrival_mode:
          $ref: '#/components/schemas/ArrivalMode'
        time_scale:
          type: number
          default: 1.0
        output_path:
          type: string
          description: Defaults to `/results/workload_runs/<run_id>.json`.
        save_per_request:
          type: boolean
          default: true
        start_at_wall_time:
          type: string
          description: Optional UTC ISO timestamp; proxy waits until this time before replaying the trace.
      additionalProperties: false

    WorkloadStatus:
      type: object
      properties:
        running: { type: boolean }
        status:
          type: string
          enum: [idle, scheduled, running, succeeded, failed, cancelled]
        phase:
          type: string
          description: |
            Finer-grained progress signal layered on top of `status`.
            `idle` before any run; `waiting-start-at-wall-time` while sleeping
            until `start_at_wall_time`; `starting` between scheduled and the
            first dispatched request; `replay-running` once requests are in
            flight; `done`/`cancelled`/`failed` mirror the terminal `status`.
          enum:
            - idle
            - waiting-start-at-wall-time
            - starting
            - replay-running
            - done
            - cancelled
            - failed
        run_id:
          oneOf:
            - type: string
            - type: 'null'
        started_at:
          oneOf:
            - type: string
            - type: 'null'
        finished_at:
          oneOf:
            - type: string
            - type: 'null'
        config:
          oneOf:
            - type: object
            - type: 'null'
        stats:
          oneOf:
            - type: object
            - type: 'null'
        output_path:
          oneOf:
            - type: string
            - type: 'null'
        error:
          oneOf:
            - type: string
            - type: 'null'

    WorkloadStatusResponse:
      type: object
      required: [workload]
      properties:
        workload: { $ref: '#/components/schemas/WorkloadStatus' }

    BatchTuningStartRequest:
      allOf:
        - $ref: '#/components/schemas/WorkloadStartRequest'
        - type: object
          properties:
            metric:
              type: string
              enum:
                - output_throughput
                - total_throughput
                - request_throughput
                - neg_p95_ttft
                - neg_p99_ttft
                - neg_p95_e2e
                - neg_avg_itl
            algorithm:
              type: string
              enum: [hill-climb, gaussian-es]
            max_steps: { type: integer, minimum: 0 }
            initial_step: { type: number }
            min_step: { type: number }
            sigma: { type: number }
            sigma_min: { type: number }
            seed: { type: integer }
            relative_tolerance: { type: number }
            output_dir: { type: string }
            t_prefill_min: { type: number }
            t_prefill_max: { type: number }
            queued_tokens_weight_min: { type: number }
            queued_tokens_weight_max: { type: number }

    BatchTuningStatusResponse:
      type: object
      required: [batch_tuning]
      properties:
        run_id: { type: string }
        status: { type: string }
        status_url: { type: string }
        batch_tuning:
          type: object
          additionalProperties: true

    AutoTuneStatus:
      type: object
      description: |
        Live snapshot of the auto-tuner's config + diagnostics.
      required:
        - enabled
        - window_size
        - hop_size
        - apply
        - buffered_samples
        - samples_since_last_apply
        - applied_count
        - current_policy
        - current_hyperparameters
      properties:
        enabled: { type: boolean }
        window_size: { type: integer }
        hop_size: { type: integer }
        apply: { type: boolean }
        buffered_samples:
          type: integer
          description: Current size of the per-request sample ring buffer.
        samples_since_last_apply:
          type: integer
          description: |
            Counter incremented on each successful sample append while
            enabled; resets to 0 after each recompute.
        samples_until_next_apply:
          type: [integer, "null"]
          description: |
            Convenience: `max(0, hop_size - samples_since_last_apply)`
            while enabled, or `null` while disabled.
        applied_count:
          type: integer
          description: How many recomputes have fired since the proxy started.
        last_applied_at_monotonic:
          type: [number, "null"]
          description: time.monotonic() of the most recent recompute, or null.
        last_recommendation:
          oneOf:
            - { $ref: '#/components/schemas/HyperparameterStore' }
            - { type: "null" }
          description: |
            Last recommendation produced by the auto-tuner. Carries
            both pooled `defaults` and any `per_target` overrides
            that crossed the per-target sample threshold during the
            most recent window.
        enabled_at_monotonic:
          type: [number, "null"]
          description: time.monotonic() when the tuner was last enabled.
        current_policy:
          type: string
          description: |
            Current routing policy. Auto-tune only mutates anything when
            this is `gorgo`; under other policies recomputes are skipped
            and the per-window counter pins at `hop_size`.
        current_hyperparameters:
          $ref: '#/components/schemas/HyperparameterStore'

    TuneSample:
      type: object
      description: |
        Per-request observation. `ping_seconds` is the most-recent
        proxy<->replica metrics-scrape latency at the time the sample
        was recorded, used as a stand-in for the irreducible RTT that
        gets subtracted from TTFT to estimate prefill time.
      properties:
        ping_seconds: { type: number }
        ttft_seconds: { type: number }
        total_seconds: { type: number }
        prefill_seconds: { type: number }
        decode_seconds: { type: number }
        prompt_tokens: { type: integer }
        completion_tokens: { type: integer }
        prefill_rate_seconds_per_token: { type: number }
        decode_rate_seconds_per_token: { type: number }
        target: { type: string, format: uri }
        recorded_at_monotonic:
          type: number
          description: time.monotonic() at the moment the sample was appended.

    StatsBlock:
      type: object
      description: Common-shape summary used across the tuning endpoints.
      properties:
        n: { type: integer }
        mean: { type: number }
        median: { type: number }
        min: { type: number }
        max: { type: number }
        p50: { type: number }
        p95: { type: number }
        p99: { type: number }

    OLSFit:
      type: object
      properties:
        a: { type: number, description: intercept }
        b: { type: number, description: slope }
        r2: { type: number }
        n: { type: integer }

    SamplesState:
      type: object
      required: [buffered_samples, max_buffer_size, total_samples_appended, auto_tune]
      properties:
        buffered_samples: { type: integer }
        max_buffer_size: { type: integer }
        total_samples_appended:
          type: integer
          description: |
            Monotonically increasing across the proxy lifetime. Unlike
            `buffered_samples`, this does not saturate at `max_buffer_size`,
            so it can be diffed across snapshots to count new arrivals.
        auto_tune:
          $ref: '#/components/schemas/AutoTuneStatus'
        recent:
          type: array
          description: Last 50 samples appended (newest at the end).
          items: { $ref: '#/components/schemas/TuneSample' }

    TuneResponse:
      type: object
      required: [auto_tune]
      description: |
        Returned from `POST /tune` after the live config is updated.
        Always carries the post-update `auto_tune` snapshot;
        additionally, when the sample buffer is non-empty, includes a
        `preview` of what the next recompute would produce against the
        current trailing window.
      properties:
        auto_tune:
          $ref: '#/components/schemas/AutoTuneStatus'
        preview:
          oneOf:
            - { type: "null" }
            - type: object
              required: [window_size_used, recommendation, stats]
              properties:
                window_size_used: { type: integer }
                recommendation:
                  $ref: '#/components/schemas/HyperparameterStore'
                stats:
                  type: object
                  properties:
                    prefill_rate_seconds_per_token: { $ref: '#/components/schemas/StatsBlock' }
                    decode_rate_seconds_per_token: { $ref: '#/components/schemas/StatsBlock' }
                    ping_seconds: { $ref: '#/components/schemas/StatsBlock' }
                    prefill_ols_fit: { $ref: '#/components/schemas/OLSFit' }
                    decode_ols_fit: { $ref: '#/components/schemas/OLSFit' }

    ChatCompletionsRequest:
      type: object
      description: |
        OpenAI-compatible chat-completions request. The proxy inspects
        `messages` for token-counting; all other fields pass through
        unchanged to the selected replica.
      required: [messages]
      properties:
        model: { type: string }
        messages:
          type: array
          items: { $ref: '#/components/schemas/ChatMessage' }
        temperature: { type: number }
        top_p: { type: number }
        max_tokens: { type: integer }
        stream:
          type: boolean
          description: |
            When true, the upstream replica returns SSE chunks and the proxy
            streams them through without buffering, so time-to-first-token
            reflects the replica's actual generation latency.
      additionalProperties: true

    ChatMessage:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [system, user, assistant, tool, function]
        content:
          oneOf:
            - { type: string }
            - type: array
              items:
                type: object
                properties:
                  type: { type: string }
                  text: { type: string }
                additionalProperties: true
        name: { type: string }
      additionalProperties: true

    ChatCompletionsResponse:
      type: object
      description: Forwarded verbatim from the upstream replica.
      additionalProperties: true

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error: { type: string }
      additionalProperties: true

  responses:
    BadRequest:
      description: Malformed JSON, wrong body shape, or rejected values.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

    MethodNotAllowed:
      description: HTTP method not supported on this path.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

    HyperparametersUpdated:
      description: Post-update view of the hyperparameter store.
      content:
        application/json:
          schema:
            type: object
            required: [hyperparameters]
            properties:
              hyperparameters: { $ref: '#/components/schemas/HyperparameterStore' }
