[project]
name = "GORGO"
version = "0.1.0"
dependencies = [
    "PyYAML>=6.0",
]

[project.optional-dependencies]
modal = [
    "modal>=1.4.0",
]
tokenizers = [
    "tiktoken>=0.7",
]
dev = [
    "pytest>=7.0",
]

[project.scripts]
routing-harness = "routing_harness.cli:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = "-ra -q"
